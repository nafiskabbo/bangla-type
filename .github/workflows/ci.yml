name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (arm64)
        run: |
          xcodebuild -scheme banglatype -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build build
      - name: Build (x86_64)
        run: |
          xcodebuild -scheme banglatype -configuration Debug \
            -destination 'platform=macOS,arch=x86_64' \
            -derivedDataPath build build
      - name: Run tests
        run: |
          xcodebuild test -scheme banglatype -configuration Debug \
            -destination 'platform=macOS' -derivedDataPath build
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BanglaType.app
          path: build/Build/Products/Debug/BanglaType.app
